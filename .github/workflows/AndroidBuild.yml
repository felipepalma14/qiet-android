# This is a basic workflow to help you get started with Actions
name: Android Build

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "develop" branch
  pull_request:
    branches:
      - developer
      - release
      - feature/*
  push:
    branches:
      - developer
      - main
# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout
        uses: actions/checkout@v4.1.1

      - name: Setup Java JDK
        uses: actions/setup-java@v4.0.0
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Run lint
        run: ./gradlew lintDebug --no-daemon
        continue-on-error: false

      - name: Run unit tests + jacoco (build & coverage)
        run: ./gradlew clean check --no-daemon
        continue-on-error: false

      # Once our task has finished,
      # upload the unit tests report as an artifact!
      - name: Upload unit tests report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            **/build/test-results
            **/build/reports/tests/testDebugUnitTest

      # Once our task has finished,
      # upload JaCoCo's report as an artifact!
      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: | 
            **/build/reports/jacoco/generateJacocoCoverageReport/html

      # Runs a single command using the runners shell
      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qiet.apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload coverage to Codecov
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v4
        with:
          files: |
              **/build/reports/jacoco/*.xml
              **/build/reports/jacoco/**/*.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}